<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xitij 23 | Admin Portal</title>
  <link rel="shortcut icon" href="/static/images/xitij.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.15/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tw-elements/dist/css/tw-elements.min.css" />
  <!-- <script src="https://cdn.tailwindcss.com/3.3.0"></script> -->
  <style>
    a:link,
    a:visited {
      color: #000;
      text-decoration: none;
    }

    html,
    body {
      max-width: 100%;
      overflow-x: hidden;
    }

    .btn {
      visibility: visible;
      color: #000;
    }
  </style>
</head>

<body class="body bg-white">
  <nav
    class="relative plex w-full flex-wrap items-center justify-between bg-[#FBFBFB] py-2 text-neutral-500 shadow-lg hover:text-neutral-700 focus:text-neutral-700 dark:bg-neutral-600 lg:py-4"
    data-te-navbar-ref style="border-radius: 0px 0px 40px 40px;background: #fbfbfb;">
    <div class="flex w-full flex-wrap items-center justify-between px-3 mt-2">
      <div class="flex items-center">
        <a class="mx-2 mr-6  flex items-center text-neutral-900 hover:text-neutral-900 focus:text-neutral-900 lg:mb-0 lg:mt-0"
          href="#">
          <img class="mr-4 logo" src="/static/images/gtusymbol.png" style="height: 90px" alt="TE Logo" loading="lazy" />
        </a>
      </div>


      <div class="flex items-center justify-center flex-grow">
        <a class="mx-2  flex items-center text-neutral-900 hover:text-neutral-900 focus:text-neutral-900 lg:mb-0 lg:mt-0"
          href="#">
          <img class="ml-4 logo" src="/static/images/xitij.png" style="height: 120px" alt="TE Logo" loading="lazy" />
        </a>
      </div>


      <div class="flex items-center">
        <a class="mx-2 ml-4 my-1 flex items-center text-neutral-900 hover:text-neutral-900 focus:text-neutral-900 lg:mb-0 lg:mt-0"
          href="#">
          <img class="mr-2 logo" src="/static/images/sallogo.png" style="height: 90px" alt="TE Logo" loading="lazy" />
        </a>
      </div>

      <div class="flex w-full flex-wrap items-center justify-center px-3 pt-4 ">

        <div>
          <a href="/admin_only" style="text-decoration: none;">
            <button
              class="bg-aqua text-black border-0 border-black px-4 py-0 pb-2 pt-2 items-center rounded-md hover:bg-gray-200 hover:text-black">Dashboard</button></a>

          </a>

          <a href="/logout" style="text-decoration: none;">
            <button
              class="bg-aqua text-black border-0 border-black px-4 py-0 pb-2 pt-2 items-center rounded-md hover:bg-gray-200 hover:text-black">Logout</button></a>

          </a>
        </div>
      </div>
    </div>

    <div class="!visible mt-2 hidden flex-grow basis-[100%] items-center lg:mt-0 lg:!flex lg:basis-auto"
      id="navbarSupportedContent4" data-te-collapse-item></div>
  </nav>


  <div class="flex-1 container mx-auto py-4">
    <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-2 gap-2">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Total Student Registered</h5>
          <a href="/admin_student_show"><button type="button" class="btn btn-outline-primary">Total Students:
              {{student}}</button></a>
        </div>
      </div>
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Total Colleges Registered</h5>
          <a href="/admin_faculty_show"><button type="button" class="btn btn-outline-primary">Total Colleges:
              {{college}}</button></a>
        </div>
      </div>
    </div>
  </div>
  <h2 class="text-center">Event Wise Total Data</h2>
  <div class="container mx-auto p-4">
    <table class="table table-striped table-hover">
      <thead>
        <tr class="table-dark" style="text-align: center;">
          <th>Event Name</th>
          <th>Total Colleges Participated</th>
          <th>View</th>
        </tr>
      </thead>
      <tbody>
        {% for i in events %}
        <tr style="text-align: center;">

          <td>{{ i.event_name }}</td>
          <td>{{ i.total_colleges_participated }}</td>
          <td><a href="/admin_events/{{i.event_id}}"><button type="button"
                class="btn btn-outline-primary">Info</button></a></td>

        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/tw-elements/dist/js/tw-elements.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
    integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
    integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
    crossorigin="anonymous"></script>
</body>

</html>
